name: Sync Status Label (Projects V2)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  issues:
    types: [edited, labeled, unlabeled, assigned, unassigned]
  push:
    branches: [main, kmp]
  pull_request:
    branches: [main]

jobs:

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew
          :core:model:testDebugUnitTest
          :core:domain:testDebugUnitTest
          :core:sdui-core:testDebugUnitTest
          :core:sdui-components:testDebugUnitTest
          :core:sdui-runtime:testDebugUnitTest
          :core:data:testDebugUnitTest
          :shared:testDebugUnitTest
          :feature:home:testDebugUnitTest
          --continue

      - name: Generate JaCoCo coverage report
        if: always()
        run: ./gradlew jacocoFullReport

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/full/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/testDebugUnitTest/'
          retention-days: 7

  # ─── Sync Status Labels ────────────────────────────────────────────────────
  sync:
    name: Sync Status Labels
    if: github.event_name != 'push' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Sync status labels from Project V2
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const statusLabels = [
              "status: backlog",
              "status: ready",
              "status: in-progress",
              "status: in-review",
              "status: done"
            ];

            const statusToLabel = {
              "Backlog":     "status: backlog",
              "Ready":       "status: ready",
              "In Progress": "status: in-progress",
              "In progress": "status: in-progress",
              "In Review":   "status: in-review",
              "In review":   "status: in-review",
              "Done":        "status: done"
            };

            const query = `
              query($login: String!, $projectNumber: Int!) {
                user(login: $login) {
                  projectV2(number: $projectNumber) {
                    id
                    items(first: 100) {
                      nodes {
                        fieldValues(first: 10) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                            }
                          }
                        }
                        content {
                          ... on Issue {
                            number
                            repository {
                              name
                              owner { login }
                            }
                            labels(first: 10) {
                              nodes { name }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              login: "douglaswilliamnsantana",
              projectNumber: 4
            });

            const items = result.user.projectV2.items.nodes;
            console.log(`📦 Total items: ${items.length}`);

            for (const item of items) {
              const issue = item.content;
              if (!issue?.number) continue;
              if (issue.repository.name !== "android-sdui") continue;

              const statusField = item.fieldValues.nodes.find(
                f => f?.field?.name === "Status"
              );

              if (!statusField?.name) {
                console.log(`⚠️ Issue #${issue.number} sem status definido`);
                continue;
              }

              console.log(`🔍 Issue #${issue.number} → Status: ${statusField.name}`);

              const newLabel = statusToLabel[statusField.name];
              if (!newLabel) {
                console.log(`⚠️ Status "${statusField.name}" não mapeado`);
                continue;
              }

              const currentLabels = issue.labels.nodes.map(l => l.name);

              for (const label of statusLabels) {
                if (currentLabels.includes(label) && label !== newLabel) {
                  await github.rest.issues.removeLabel({
                    owner: "douglaswilliamnsantana",
                    repo: "android-sdui",
                    issue_number: issue.number,
                    name: label
                  }).catch(e => console.log(`⚠️ Erro ao remover label: ${e.message}`));
                }
              }

              if (!currentLabels.includes(newLabel)) {
                await github.rest.issues.addLabels({
                  owner: "douglaswilliamnsantana",
                  repo: "android-sdui",
                  issue_number: issue.number,
                  labels: [newLabel]
                });
                console.log(`✅ Issue #${issue.number} → ${newLabel}`);
              } else {
                console.log(`✔️ Issue #${issue.number} já tem a label correta`);
              }
            }
